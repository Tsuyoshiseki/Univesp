<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustache — Entrar</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💈</text></svg>">
</head>
<body>

<div class="auth-page">
    <!-- LEFT: Hero panel -->
    <div class="auth-hero">
        <div class="auth-hero-content">
            <div class="auth-hero-logo">💈 Mustache</div>
            <span class="auth-scissors-deco"></span>
            <p class="auth-hero-tagline">
                A plataforma completa de agendamentos para salões de beleza e barbearias.
            </p>
        </div>
    </div>

    <!-- RIGHT: Form panel -->
    <div class="auth-form-panel">
        <div class="auth-form-box">
            <h2>Bem-vindo</h2>
            <p class="subtitle">Faça login ou crie sua conta para agendar</p>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Entrar</button>
                <button class="auth-tab" data-tab="register">Criar Conta</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="panel-login">
                <div id="login-error" class="alert alert-error hidden"></div>
                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" class="form-control"
                               placeholder="seu@email.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="login-senha">Senha</label>
                        <input type="password" id="login-senha" name="senha" class="form-control"
                               placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:.5rem">
                        Entrar
                    </button>
                </form>
                <p class="text-muted text-center mt-2" style="font-size:.85rem">
                    Demo — Admin: <strong>admin@salon.com</strong> / <strong>admin123</strong>
                </p>
            </div>

            <!-- REGISTER FORM -->
            <div id="panel-register" class="hidden">
                <div id="reg-error" class="alert alert-error hidden"></div>
                <form id="register-form" novalidate>
                    <div class="form-group">
                        <label for="reg-nome">Nome Completo</label>
                        <input type="text" id="reg-nome" name="nome" class="form-control"
                               placeholder="João Silva" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" name="email" class="form-control"
                               placeholder="seu@email.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="reg-tel">Telefone</label>
                        <input type="tel" id="reg-tel" name="telefone" class="form-control"
                               placeholder="(11) 99999-0000">
                    </div>
                    <div class="form-group">
                        <label for="reg-senha">Senha</label>
                        <input type="password" id="reg-senha" name="senha" class="form-control"
                               placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="reg-confirm">Confirmar Senha</label>
                        <input type="password" id="reg-confirm" name="confirm" class="form-control"
                               placeholder="Repita a senha" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:.5rem">
                        Criar Conta
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
